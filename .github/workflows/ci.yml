name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: src/KeyMagic.Web/package.json

      - name: Install frontend dependencies
        working-directory: src/KeyMagic.Web
        run: bun ci

      - name: Build frontend
        working-directory: src/KeyMagic.Web
        run: bun run build

      - name: Restore .NET dependencies
        run: dotnet restore KeyMagic.sln --runtime win-x64 /p:SelfContained=true

      - name: Build solution
        run: dotnet build KeyMagic.sln --configuration Release --no-restore

      - name: Publish service
        run: dotnet publish src/KeyMagic.Service/KeyMagic.Service.csproj --configuration Release --runtime win-x64 --self-contained --output artifacts/publish/service/win-x64 --no-restore /p:PublishSingleFile=true

      - name: Assert single-file publish asset
        shell: pwsh
        run: ./scripts/assert-portable-publish-assets.ps1 -ServicePublishDir artifacts/publish/service/win-x64

      - name: Upload service artifact
        uses: actions/upload-artifact@v4
        with:
          name: keymagic-win-x64-exe
          path: artifacts/publish/service/win-x64/KeyMagic.exe
          retention-days: 14
