<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ambient glow gradient -->
    <radialGradient id="glow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06080d" stop-opacity="0"/>
    </radialGradient>
    <!-- Glass border gradient -->
    <linearGradient id="glassBorder" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.12"/>
    </linearGradient>
    <!-- K gradient -->
    <linearGradient id="kGrad" x1="14" y1="14" x2="36" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Bolt glow -->
    <filter id="boltGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer shadow -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#06080d"/>
  <!-- Ambient glow -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#glow)"/>
  <!-- Glass surface -->
  <rect x="3" y="3" width="58" height="58" rx="15" fill="#0c0e14" fill-opacity="0.7"/>
  <!-- Glass inner highlight -->
  <rect x="3" y="3" width="58" height="28" rx="15" fill="#ffffff" fill-opacity="0.04"/>
  <!-- Glass border -->
  <rect x="3" y="3" width="58" height="58" rx="15" fill="none" stroke="url(#glassBorder)" stroke-width="1"/>
  <!-- K lettermark -->
  <path d="M17 16V48" stroke="url(#kGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M17 32L33 17" stroke="url(#kGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M17 32L33 47" stroke="url(#kGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Lightning bolt with glow -->
  <path d="M43 11L37 26H44L38 41" stroke="#06b6d4" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#boltGlow)"/>
  <!-- Status dot with ring -->
  <circle cx="51" cy="51" r="6" fill="#06080d"/>
  <circle cx="51" cy="51" r="4.5" fill="#10b981"/>
  <circle cx="51" cy="51" r="4.5" fill="none" stroke="#10b981" stroke-opacity="0.3" stroke-width="2"/>
</svg>
